<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#ececec"/>
    </linearGradient>

    <linearGradient id="frontBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9a15f"/>
      <stop offset="100%" stop-color="#b8793c"/>
    </linearGradient>

    <linearGradient id="sideBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bf7f42"/>
      <stop offset="100%" stop-color="#945a27"/>
    </linearGradient>

    <linearGradient id="topFlap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efbe83"/>
      <stop offset="100%" stop-color="#cb8f52"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
    </filter>

    <pattern id="lines" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 0V8" stroke="#ffffff" stroke-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Ground shadow -->
  <ellipse cx="600" cy="700" rx="310" ry="55" fill="#000" opacity="0.08"/>

  <!-- Box -->
  <g filter="url(#shadow)">

    <!-- Back flaps -->
    <polygon points="420,240 600,160 780,240 600,330"
      fill="url(#topFlap)"/>

    <polygon points="780,240 980,330 820,470 600,330"
      fill="#d59a5c"/>

    <polygon points="220,330 420,240 600,330 380,470"
      fill="#d9a86b"/>

    <!-- Front flaps -->
    <polygon points="380,470 600,390 820,470 600,560"
      fill="#efc38b"/>

    <!-- Left side -->
    <polygon points="380,470 600,560 600,760 380,650"
      fill="url(#sideBox)"/>

    <!-- Right side -->
    <polygon points="600,560 820,470 820,650 600,760"
      fill="#9e642f"/>

    <!-- Front -->
    <polygon points="380,470 600,390 820,470 600,560"
      fill="url(#frontBox)"/>

    <!-- Texture overlay -->
    <polygon points="380,470 600,390 820,470 600,560"
      fill="url(#lines)" opacity="0.35"/>

    <!-- Inside -->
    <polygon points="420,330 600,250 780,330 600,420"
      fill="#5a3418"/>

    <!-- Brand -->
    <g transform="translate(470 500)">
      <text x="130" y="70"
        text-anchor="middle"
        font-size="64"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        fill="#111111">
        Securitybox
      </text>

      <!-- Underline -->
      <line x1="0" y1="95" x2="260" y2="95"
        stroke="#111111"
        stroke-width="4"
        opacity="0.7"/>
    </g>

  </g>
</svg>